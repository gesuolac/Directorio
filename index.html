<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Directorio WAR ROOM DILADOS</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- Pantalla de acceso -->

<div id="login">

    <div class="login-box">

        <h2>🔒 Acceso al Directorio</h2>

        <input
            type="password"
            id="password"
            placeholder="Ingrese la contraseña"
            onkeypress="if(event.key==='Enter') validarPassword()"
        >

        <button onclick="validarPassword()">
            Entrar
        </button>

        <p id="mensajeError"></p>

    </div>

</div>

<!-- Contenido oculto hasta ingresar la contraseña -->

<div id="contenido" style="display:none;">

    <div class="contenedor">

        <h1>📒 Directorio WAR ROOM DILADOS</h1>

        <input
            type="text"
            id="buscar"
            placeholder="Buscar Centro de Trabajo..."
        >

        <button onclick="buscar()">
            Buscar
        </button>

        <div id="resultado"></div>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
